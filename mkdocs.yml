site_name: Authifi Documentation
site_description: Public documentation for the Authifi identity and access management platform
site_url: https://docs.authifi.io

hooks:
  - docs/hooks/agent_assets.py

exclude_docs: |
  auth.md
  .well-known/**/SKILL.md

extra_javascript:
  - javascripts/webmcp.js

theme:
  name: material
  logo: assets/authifi-logo.png
  favicon: assets/authifi-logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - awesome-nav

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/axleresearch/authifi-docs

copyright: >
  <img src="/assets/axle-icon.png" alt="Axle Informatics" style="height: 24px; vertical-align: middle; margin-right: 8px;">
  Copyright &copy; 2026 Axle Informatics, LLC. All rights reserved.